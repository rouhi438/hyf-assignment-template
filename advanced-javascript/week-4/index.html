<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>ScreenShot Generator App</title>
  </head>
  <body>
    <div class="app-container">
      <h1 class="title">WebShot Collector</h1>
      <header>
        <div class="form-holder">
          <label for="url-input" class="url-label">Website URL</label>
          <input
            type="text"
            id="url-input"
            placeholder="https://example.example"
          />
        </div>
        <button type="button" id="send-btn" class="send-btn">Send URL</button>
      </header>
      <div id="screens-container" class="screens-container"></div>
    </div>
    <script src="script.js" type="module"></script>
  </body>
</html>
