<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Working with movies</title>
  </head>
  <body>
    <div class="container">
      <div class="movies">
        <p class="title">Working with movies</p>

        <div class="btns">
          <button type="button" class="get-all">
            Show the number of all movies
          </button>
          <button type="button" class="short-btn">
            Show Short Title Movies
          </button>
          <button type="button" class="long-title">Long Title Movies</button>
          <button type="button" class="eighties-movies">1980s movies</button>
          <button type="button" class="extra-key">
            Adding Extra Key called Tag
          </button>
          <button type="button" class="higher">Higher Rate Movies</button>
          <button type="button" class="key-word">Movies With Key Word</button>
          <button type="button" class="duplicate">
            Duplicated Title Movies
          </button>
          <button type="button" class="average">Average Rating</button>
          <button type="button" class="rate-counter">
            Good, Average & Bad Movies
          </button>
        </div>
      </div>
      <hr />
      <p class="text"></p>

      <div class="movie-cards"></div>
    </div>
    <script src="app.js"></script>
  </body>
</html>
